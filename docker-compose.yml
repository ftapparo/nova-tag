services:
  nova-tag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nova-tag
    restart: unless-stopped
    ports:
      # - "4009:4009"  # Porta do webserver TAG1
      - "4010:4010"  # Porta do webserver TAG2
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - /mnt/windows/nova-tag/logs:/app/logs
    networks:
      - nova-network
    healthcheck:
      # test: ["CMD", "sh", "-c", "wget --quiet --tries=1 --spider http://localhost:4009/health && wget --quiet --tries=1 --spider http://localhost:4010/health"]
      test: ["CMD", "sh", "-c", "wget --quiet --tries=1 --spider http://localhost:4010/v2/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nova-network:
    external: true
    name: nova-network
